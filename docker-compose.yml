services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fasal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rehpostgre1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=fasal_db
      - DB_USER=postgres
      - DB_PASSWORD=rehpostgre1
      - SECRET_KEY=poc-dev-secret-key-change-in-prod
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: