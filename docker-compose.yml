services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fasal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rehpostgre1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  redis:                                         
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=fasal_db
      - DB_USER=postgres
      - DB_PASSWORD=rehpostgre1
      - DB_PORT=5432
      - SECRET_KEY=poc-dev-secret-key-change-in-prod
      - CELERY_BROKER_URL=redis://redis:6379/0  
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}      
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:                     
        condition: service_healthy
  celery_worker:     
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_NAME=fasal_db
      - DB_USER=postgres
      - DB_PASSWORD=rehpostgre1
      - DB_PORT=5432
      - SECRET_KEY=poc-dev-secret-key-change-in-prod
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}     
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:              
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_NAME=fasal_db
      - DB_USER=postgres
      - DB_PASSWORD=rehpostgre1
      - DB_PORT=5432
      - SECRET_KEY=poc-dev-secret-key-change-in-prod
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}  
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  celery_worker_credit:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -Q credit_checks -c 2 -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_NAME=fasal_db
      - DB_USER=postgres
      - DB_PASSWORD=rehpostgre1
      - DB_PORT=5432
      - SECRET_KEY=poc-dev-secret-key-change-in-prod
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data: